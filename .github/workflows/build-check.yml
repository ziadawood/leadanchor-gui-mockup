name: Build Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Check for GBP currency
        run: |
          if grep -r "£" ./src; then
            echo "ERROR: Found £ symbol in source files"
            exit 1
          fi

      - name: Check for GBP code
        run: |
          if grep -r "GBP" ./src; then
            echo "ERROR: Found GBP currency code in source files"
            exit 1
          fi

      - name: Confirm dist output exists
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "ERROR: dist/index.html not found"
            exit 1
          fi
